# Default Agent 配置
name: Default-Agent
description: 通用软件开发助手

# 系统提示词文件路径
system_prompt: system_prompt.md

# 系统提示词参数（可选）
system_prompt_args: { }

# 指定模型（可选，如果不指定则使用全局默认模型）
model: qwen3.5-plus
#model: cursor-opus
#model: composer
#model: cursor-auto

#model: deepseek-v3.2-exp

#model: qwen3:4b-thinking-2507-q8_0
#model: qwen3:4b-instruct-2507-q8_0

#model: glm-4.7


# 可用工具列表
tools:
  #文件操作:
  - Glob
  - Grep
  - ReadFile
  - StrReplaceFile
  - WriteFile

  #→ Shell:
  - BashTool
  
  #→ Web:
  - FetchURL
  - SearchWeb
  
  #→ 其他:
  - AskHuman
  - AsyncTask
  - CallGraphTool
  - CodeLocateTool
  - ImpactAnalysisTool
  - MetaTool
  - SetTodoList
  - SubAgentTool
  - TeamAgentTool
  - Skills

# 子 Agent 配置（Subagent 模式：独立子任务，无横向通信）
subagents:
  Architect-Agent:
    path: sub/architect/agent.yaml
    description: 需求分析、架构设计、技术方案和任务规划
  Code-Agent:
    path: sub/code/agent.yaml
    description: 代码实现、重构、优化和调试
  Quality-Agent:
    path: sub/quality/agent.yaml
    description: 代码质量审查、测试执行和质量保障
  DevOps-Agent:
    path: sub/devops/agent.yaml
    description: 项目构建、应用部署和运维管理
  Doc-Agent:
    path: sub/doc/agent.yaml
    description: 技术文档编写、维护和技术信息调研

# Agent Teams 配置（团队协作模式：共享任务列表，可横向通信）
# 当任务有依赖关系或需要多角色协调时，使用 TeamAgentTool 启动团队
team:
  name: dev-team
  max_concurrency: 3
  timeout_seconds: 1800
  strategy: free_claim
  teammates:
    - teammate_id: architect
      agent_path: team/architect/agent.yaml
      description: 需求分析、架构设计、技术方案和任务规划
      specialties:
        - 架构设计
        - 技术选型
        - 任务拆解
    - teammate_id: coder
      agent_path: team/coder/agent.yaml
      description: 代码实现、重构、优化和调试
      specialties:
        - 代码编写
        - 重构优化
        - Bug修复
    - teammate_id: tester
      agent_path: team/tester/agent.yaml
      description: 代码质量审查、测试执行和质量保障
      specialties:
        - 单元测试
        - 代码审查
        - 质量保障
    - teammate_id: doc-writer
      agent_path: team/doc-writer/agent.yaml
      description: 技术文档编写、维护和技术信息调研
      specialties:
        - 文档编写
        - API文档
        - 技术调研
