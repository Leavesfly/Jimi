name: "git-commit"
description: "添加并提交所有更改"
category: "git"

aliases:
  - "gc"

usage: "/git-commit <message>"

parameters:
  - name: "message"
    type: "string"
    required: true
    description: "提交信息"

execution:
  type: "composite"
  steps:
    - type: "script"
      script: "git add ."
      description: "暂存所有更改"
      continueOnFailure: false
    - type: "script"
      script: 'git commit -m "${MESSAGE}"'
      description: "提交更改"
      continueOnFailure: false

preconditions:
  - type: "dir_exists"
    path: ".git"
    errorMessage: "当前目录不是 Git 仓库"
  - type: "command_exists"
    command: "git"
    errorMessage: "Git 未安装"
